# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
source = /home/$USER/.config/hypr/hyprcolors.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=HDMI-A-1,3440x1440@99.98Hz,auto,auto
# monitor=HDMI-A-1,preferred,auto,auto
monitor=eDP-1,preferred,auto,1.5
# monitor=DP-2,3840x2160@60.00Hz,auto,1.6

workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:eDP-1

# workspace = 1, monitor:DP-2
# workspace = 2, monitor:eDP-1
# workspace = 3, monitor:DP-2
# workspace = 4, monitor:eDP-1
# workspace = 5, monitor:DP-2
# workspace = 6, monitor:eDP-1
# workspace = 7, monitor:DP-2
# workspace = 8, monitor:eDP-1
# workspace = 9, monitor:DP-2
# workspace = 10, monitor:eDP-1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$launch = uwsm app --
$terminal = ghostty
$menu = wofi --show drun

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = $launch hyprlock --immediate-render || hyprctl dispatch exit
exec-once = [workspace 1] $launch $terminal +new-window
exec-once = [workspace 1] $launch $terminal +new-window
exec-once = [workspace 3 silent] $launch legcord


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_THEME,Nordzy-cursors
env = HYPRCURSOR_THEME,Nordzy-cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 1
    gaps_out = 2

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $color11 $color13 45deg
    col.inactive_border = $color7

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = scrolling
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    active_opacity = 1
    inactive_opacity = 0.98
    fullscreen_opacity = 1
    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = true
        popups = true
    }
    shadow {
        enabled = false
        range = 10
        render_power = 5
        color = rgba(ffffffff)
        ignore_window = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true
    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    bezier = linear, 0,0,1,1
    bezier = swirl, 0.1,1.4,0.3,1

    animation = windows, 1, 2, swirl, popin 0%
    animation = fade, 0
    animation = workspaces, 1, 2, swirl
    animation = specialWorkspace, 1, 2, swirl, slidevert -50%
}

cursor {
    hide_on_key_press = true
}

scrolling {
    focus_fit_method = 0
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = true # If true disables the splash rendering.
}

debug {
    disable_logs = true
}

group {
    col.border_active = $color11 $color13 45deg
    col.border_inactive = $color7
    groupbar {
        font_family = Cascadia Mono
        col.active = $color11
        col.inactive = $color7
        text_color = rgb(000000)
        gradients = true
        gradient_rounding = 3
        gradient_round_only_edges = false
        indicator_height = 0
        scrolling = false
    }
}

plugin {
    dynamic-cursors {
        mode = none
    }
    overview {
        gapsIn = 1
        gapsOut = 2
    }
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = caps:swapescape,compose:ralt
    kb_rules =

    follow_mouse = 1
    sensitivity = 0.6
    accel_profile = flat
    touchpad {
        drag_lock = true
        natural_scroll = true
        scroll_factor = 0.3
        drag_3fg = 1
    }
}


gesture = 4, vertical, mod: SUPER, scale: -20, resize
gesture = 4, horizontal, mod: SUPER, workspace
gesture = 4, right, dispatcher, layoutmsg, focus l
gesture = 4, left, dispatcher, layoutmsg, focus r

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, return, exec, $launch $terminal +new-window
bind = $mainMod, w, killactive,
bind = $mainMod, M, exec, $launch loginctl lock-session
bind = $mainMod ALT, M, exec, $launch wlogout
bind = $mainMod, E, exec, $launch $terminal --class=foo.yazi -e yazi
bind = $mainMod ALT, V, togglefloating,
bind = $mainMod, SPACE, exec, $launch $menu
bind = $mainMod, V, exec, $launch $terminal --class=foo.clipse -e clipse
bind = $mainMod, n, exec, $launch swaync-client -t -sw
bind = $mainMod, b, exec, $launch pkill -SIGUSR1 waybar
bind = $mainMod SHIFT, c, exec, $launch hyprpicker -a -f hex
bind = $mainMod, f, fullscreenstate, 0, 2
bind = , Print, exec, $launch grim -g "$(slurp)" - | satty --filename -
bind = , Insert, exec, $launch ~/.config/hypr/scripts/electron-global-keybind.sh "Ctrl_Shift, M" class legcord
bind = ALT, Insert, exec, $launch ~/.config/hypr/scripts/electron-global-keybind.sh "Ctrl_Shift, D" class legcord

# Move focus with mainMod + hjkl keys
bind = $mainMod, h, layoutmsg, focus l
bind = $mainMod, l, layoutmsg, focus r

# Move windows with mainMod + shift + hjkl keys
bind = $mainMod ALT, h, layoutmsg, swapcol l
bind = $mainMod ALT, l, layoutmsg, swapcol r

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 8, workspace, 3
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 9, workspace, 5
bind = $mainMod, 3, workspace, 4
bind = $mainMod, 7, workspace, 1
bind = $mainMod, 4, workspace, 6
bind = $mainMod, 6, workspace, 7
bind = $mainMod, 5, workspace, 8
bind = $mainMod, 0, workspace, 9
bind = $mainMod, 1, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 8, movetoworkspace, 3
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 9, movetoworkspace, 5
bind = $mainMod SHIFT, 3, movetoworkspace, 4
bind = $mainMod SHIFT, 7, movetoworkspace, 1
bind = $mainMod SHIFT, 4, movetoworkspace, 6
bind = $mainMod SHIFT, 6, movetoworkspace, 7
bind = $mainMod SHIFT, 5, movetoworkspace, 8
bind = $mainMod SHIFT, 0, movetoworkspace, 9
bind = $mainMod SHIFT, 1, movetoworkspace, 10


# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# bind = ALT, tab, hy3:focustab, r, prioritize_hovered, wrap
bind = ALT, tab, changegroupactive

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod ALT, mouse:272, resizewindow

# Create group
bind = $mainMod SHIFT, t, togglegroup, tab, ephemeral

# Laptop multimedia keys for volume and LCD brightness
bindel = , XF86AudioRaiseVolume, exec, $launch wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
bindel = , XF86AudioLowerVolume, exec, $launch wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindl = , XF86AudioMute, exec, $launch wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, $launch wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = $mainMod, XF86AudioRaiseVolume, exec, $launch brightnessctl s 75% && $launch ddcutil setvcp 10 80
bindl = $mainMod, XF86AudioLowerVolume, exec, $launch brightnessctl s 15% && $launch ddcutil setvcp 10 0
bindl = , XF86MonBrightnessUp, exec, $launch brightnessctl s 75% && $launch ddcutil setvcp 10 80
bindl = , XF86MonBrightnessDown, exec, $launch brightnessctl s 15% && $launch ddcutil setvcp 10 0

# Requires playerctl
bindl = , XF86AudioNext, exec, $launch playerctl next
bindl = , XF86AudioPause, exec, $launch playerctl play-pause
bindl = , XF86AudioPlay, exec, $launch playerctl play-pause
bindl = , XF86AudioPrev, exec, $launch playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps. You'll probably like this.

windowrule = match:class .*, suppress_event maximize

windowrule = match:class it\.catboy\.ripdrag, move (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5))

windowrule = match:title Passbolt, float on
windowrule = match:title Passbolt, size 380 350
windowrule = match:title Passbolt, move (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5))

windowrule = match:class foo\.yazi, float on
windowrule = match:class foo\.yazi, size 1000 1000
windowrule = match:class foo\.yazi, center on

windowrule = match:class termfilechooser\.yazi, float on
windowrule = match:class termfilechooser\.yazi, size 1000 1000
windowrule = match:class termfilechooser\.yazi, move (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5))

windowrule = match:class foo\.clipse, float on
windowrule = match:class foo\.clipse, size 600 660
windowrule = match:class foo\.clipse, center on

windowrule = match:class foo\.impala, float on
windowrule = match:class foo\.impala, size 600 660
windowrule = match:class foo\.impala, center on

windowrule = match:class foo\.bluetui, float on
windowrule = match:class foo\.bluetui, size 600 660
windowrule = match:class foo\.bluetui, center on

windowrule = match:class R_x11, tile on, workspace 10 silent

layerrule = match:namespace wofi, blur on
layerrule = match:namespace wofi, ignore_alpha 0.2

layerrule = match:namespace waybar, blur on
layerrule = match:namespace waybar, ignore_alpha 0.2

layerrule = match:namespace swaync-control-center, blur on
layerrule = match:namespace swaync-control-center, ignore_alpha 0.2
layerrule = match:namespace swaync-notification-window, blur on
layerrule = match:namespace swaync-notification-window, ignore_alpha 0.2

windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false, no_initial_focus on

windowrule = match:class ^(Anydesk)$, match:title ^(anydesk)$, float on

windowrule = match:initial_class legcord, workspace 4
windowrule = match:initial_title WhatsApp Web, workspace 4
